# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# 启用Gradle守护进程（大幅加速后续构建）
org.gradle.daemon=true
# Kotlin编译策略（in-process模式避免KSP缓存冲突）
kotlin.compiler.execution.strategy=in-process
# 启用并行构建
org.gradle.parallel=true
# 禁用构建缓存（避免 Windows 文件锁冲突）
org.gradle.caching=false
# 禁用配置缓存（与 KSP/Room 存在兼容性问题）
org.gradle.configuration-cache=false
# 配置JVM参数
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8 --add-opens=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED
# 启用非传递性R类
android.nonTransitiveRClass=true
# 启用AndroidX
android.useAndroidX=true
# Kotlin代码风格
kotlin.code.style=official
# Gradle 自动检测 JDK（Android Studio 自带 JBR）
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.fromEnv=JAVA_HOME
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.disallowKotlinSourceSets=false
# 允许非ASCII路径（项目目录含中文字符）
android.overridePathCheck=true


